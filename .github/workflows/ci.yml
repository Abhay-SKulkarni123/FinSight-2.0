name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "SECRET_KEY=ci-test-secret-key-not-for-production" > .env
          echo "DEBUG=True" >> .env
          echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test main --verbosity=2

      - name: Check for missing migrations
        run: python manage.py migrate --check

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: finsight:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the full stack with docker compose
        run: |
          cat <<'EOF' > .env
          SECRET_KEY=docker-ci-smoke-test-secret
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
          EOF
          docker compose up -d
          echo "Waiting for web service to become healthy..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/ > /dev/null; then
              echo "Web service responded successfully."
              exit 0
            fi
            echo "  attempt $i: not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Web service did not become healthy in time."
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v