{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    :root{
      --bg:#0d1117;
      --card:#15181d;
      --muted:#9aa4ac;
      --text:#e6eef1;
      --accent-green:#18ff8f;
      --accent-orange:#ff9b42;
      --border:#23272b;
    }
    .light{
      --bg:#f6f7f9;
      --card:#ffffff;
      --muted:#59626a;
      --text:#0f1720;
      --accent-green:#00aa66;
      --accent-orange:#ff6b00;
      --border:#e6e9ec;
    }
    body{background:var(--bg);color:var(--text);padding-top:80px;}
    .feature-container{max-width:1200px;margin:0 auto;padding:20px;}
    .feature-header{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;}
    .feature-header h1{color:var(--accent-orange);margin:0 0 8px 0;font-size:28px;}
    .feature-header p{color:var(--muted);margin:0;}
    .form-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;}
    .form-group{margin-bottom:20px;}
    .form-group label{display:block;margin-bottom:8px;color:var(--text);font-weight:600;}
    .form-group input,.form-group select{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent-green);}
    .btn-primary{background:var(--accent-green);color:#000;border:none;padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(24,255,143,0.3);}
    .result-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-top:24px;display:none;}
    .result-card.show{display:block;}
    .prediction-value{font-size:32px;font-weight:700;color:var(--accent-green);margin:16px 0;}
    .timeline-chart{height:400px;background:var(--bg);border-radius:8px;margin-top:16px;}
</style>

<div class="feature-container">
    <div style="margin-bottom:16px;">
        <a href="{% url 'market_detail' market %}" style="color:var(--accent-green);text-decoration:none;font-weight:600;">← Back to {{ market_name }}</a>
    </div>
    <div class="feature-header">
        <h1>{{ feature.icon }} {{ feature.name }} - {{ market_name }}</h1>
        <p>{{ feature.description }}</p>
    </div>

    <div class="form-card">
        <form id="predictionForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="ticker">Ticker Symbol</label>
                <select id="ticker" name="ticker" required>
                    <option value="">Select a ticker</option>
                    {% for ticker in tickers %}
                    <option value="{{ ticker }}" data-display="{{ ticker|slice:":10" }}">{{ ticker|slice:":10" }}</option>
                    {% endfor %}
                </select>
                <span id="tickerError" class="form-error" style="display:none;"></span>
            </div>
            <div class="form-group">
                <label for="targetDate">Target Date</label>
                <input type="date" id="targetDate" name="targetDate" required>
            </div>
            <div class="form-group">
                <label for="timeline">Timeline</label>
                <select id="timeline" name="timeline" required>
                    <option value="1d">1 Day</option>
                    <option value="1w">1 Week</option>
                    <option value="1m">1 Month</option>
                    <option value="3m">3 Months</option>
                    <option value="6m">6 Months</option>
                    <option value="1y">1 Year</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Get Prediction</button>
        </form>
    </div>

    <div id="resultCard" class="result-card">
        <h2 style="color:var(--accent-orange);margin-top:0;">Prediction Results</h2>
        <div id="predictionDetails"></div>
        <div id="timelineChart" class="timeline-chart" style="position:relative;min-height:400px;">
            <div class="loading-overlay" id="chartLoading" style="display:none;">
                <div style="text-align:center;">
                    <div class="spinner" style="margin:0 auto 12px;"></div>
                    <div style="color:var(--muted);font-size:14px;">Loading chart...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Symbol formatting helper
function formatSymbolForTradingView(symbol, marketType) {
    if (!symbol) return "SP:SPX";
    
    // If already formatted with exchange, return as is
    if (symbol.includes(":")) {
        return symbol;
    }
    
    // Format based on market type
    const marketTypeMap = {
        'stocks': (s) => s.includes("NASDAQ") ? s : `NASDAQ:${s}`,
        'crypto': (s) => s.includes("BINANCE") ? s : `BINANCE:${s}USDT`,
        'indices': (s) => {
            const map = {'SPX': 'SP:SPX', 'DJI': 'DJ:DJI', 'IXIC': 'NASDAQ:IXIC'};
            return map[s] || s;
        },
        'forex': (s) => s.startsWith("FX:") ? s : `FX:${s}`,
        'metals': (s) => s.startsWith("TVC:") ? s : `TVC:${s}`,
        'energy': (s) => s.includes("NYMEX") ? s : `NYMEX:${s}`,
        'bonds': (s) => s.startsWith("TVC:") ? s : `TVC:${s}`,
        'etfs': (s) => s.includes(":") ? s : `AMEX:${s}`,
        'futures': (s) => s.includes(":") ? s : `CME:${s}`,
        'commodities': (s) => s.includes(":") ? s : `CBOT:${s}`
    };
    
    const formatter = marketTypeMap[marketType] || ((s) => s);
    return formatter(symbol);
}

document.getElementById('predictionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const tickerSelect = document.getElementById('ticker');
    const ticker = tickerSelect.value;
    const targetDate = document.getElementById('targetDate').value;
    const timeline = document.getElementById('timeline').value;
    const marketType = "{{ market_type }}";
    
    // Form validation
    const tickerError = document.getElementById('tickerError');
    let isValid = true;
    
    if (!ticker) {
        tickerError.textContent = 'Please select a ticker symbol';
        tickerError.style.display = 'block';
        tickerSelect.parentElement.classList.add('error');
        isValid = false;
    } else {
        tickerError.style.display = 'none';
        tickerSelect.parentElement.classList.remove('error');
    }
    
    if (!targetDate) {
        showToast('Validation Error', 'Please select a target date', 'error', 3000);
        isValid = false;
    }
    
    if (!isValid) {
        return;
    }
    
    const resultCard = document.getElementById('resultCard');
    const detailsDiv = document.getElementById('predictionDetails');
    const submitBtn = document.querySelector('button[type="submit"]');
    
    // Show loading state
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner" style="margin-right:8px;"></span>Predicting...';
    detailsDiv.innerHTML = `
        <div style="text-align:center;padding:20px;">
            <div class="spinner" style="margin:0 auto 16px;"></div>
            <p style="color:var(--muted);margin:0;">Analyzing market data with ML models...</p>
            <p style="color:var(--muted);font-size:12px;margin-top:8px;">This may take a few seconds</p>
        </div>
    `;
    resultCard.classList.add('show', 'fade-in');
    
    // Call ML prediction API
    fetch('/api/predict/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
        },
        body: JSON.stringify({
            ticker: ticker,
            target_date: targetDate,
            timeline: timeline,
            market_type: marketType
        })
    })
    .then(response => response.json())
    .then(data => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Get Prediction';
        
        if (data.success) {
            const changeClass = data.price_change >= 0 ? 'positive' : 'negative';
            const changeSign = data.price_change >= 0 ? '+' : '';
            
            detailsDiv.innerHTML = `
                <div style="margin-bottom:20px;">
                    <p><strong>Ticker:</strong> ${data.ticker}</p>
                    <p><strong>Target Date:</strong> ${data.target_date || 'N/A'}</p>
                    <p><strong>Timeline:</strong> ${data.timeline}</p>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
                    <div style="background:var(--bg);padding:16px;border-radius:8px;border:1px solid var(--border);">
                        <div style="color:var(--muted);font-size:14px;margin-bottom:4px;">Current Price</div>
                        <div style="font-size:24px;font-weight:700;color:var(--text);">$${data.current_price.toFixed(2)}</div>
                    </div>
                    <div style="background:var(--bg);padding:16px;border-radius:8px;border:1px solid var(--border);">
                        <div style="color:var(--muted);font-size:14px;margin-bottom:4px;">Predicted Price</div>
                        <div style="font-size:24px;font-weight:700;color:var(--accent-green);">$${data.predicted_price.toFixed(2)}</div>
                    </div>
                </div>
                <div style="background:var(--bg);padding:16px;border-radius:8px;border:1px solid var(--border);margin-bottom:20px;">
                    <div style="color:var(--muted);font-size:14px;margin-bottom:4px;">Expected Change</div>
                    <div style="font-size:32px;font-weight:700;color:${data.price_change >= 0 ? 'var(--accent-green)' : '#ff4444'};">
                        ${changeSign}$${data.price_change.toFixed(2)} (${changeSign}${data.price_change_pct.toFixed(2)}%)
                    </div>
                </div>
                <div style="background:var(--bg);padding:16px;border-radius:8px;border:1px solid var(--border);">
                    <div style="color:var(--muted);font-size:14px;margin-bottom:4px;">ML Model Confidence</div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
                            <div style="height:100%;width:${data.confidence}%;background:var(--accent-green);transition:width 0.3s;"></div>
                        </div>
                        <div style="font-size:18px;font-weight:700;color:var(--accent-green);">${data.confidence.toFixed(1)}%</div>
                    </div>
                </div>
                <p style="color:var(--muted);margin-top:16px;font-size:14px;">Prediction generated using Gradient Boosting ML model trained on historical price data and technical indicators.</p>
            `;
        } else {
            detailsDiv.innerHTML = `
                <div style="color:#ff4444;padding:16px;background:var(--bg);border-radius:8px;border:1px solid #ff4444;">
                    <strong>Error:</strong> ${data.error || 'Unable to generate prediction. Please try a different ticker or check your internet connection.'}
                </div>
            `;
        }
        
        // Load TradingView chart
        function loadPredictionChart() {
            if (typeof TradingView === 'undefined') {
                setTimeout(loadPredictionChart, 100);
                return;
            }
            
            const chartContainer = document.getElementById('timelineChart');
            const chartLoading = document.getElementById('chartLoading');
            if (chartContainer) {
                if (chartLoading) chartLoading.style.display = 'flex';
                const formattedSymbol = formatSymbolForTradingView(ticker, marketType);
                try {
                    new TradingView.widget({
                        width: "100%",
                        height: 400,
                        symbol: formattedSymbol,
                        interval: timeline === "1d" ? "60" : timeline === "1w" ? "240" : "D",
                        timezone: "Etc/UTC",
                        theme: "dark",
                        style: "1",
                        locale: "en",
                        toolbar_bg: "#111",
                        enable_publishing: false,
                        container_id: "timelineChart",
                        onchartready: function() {
                            if (chartLoading) chartLoading.style.display = 'none';
                        }
                    });
                    setTimeout(function() {
                        if (chartLoading) chartLoading.style.display = 'none';
                    }, 3000);
                } catch (e) {
                    if (chartLoading) chartLoading.style.display = 'none';
                    chartContainer.innerHTML = '<div class="fade-in" style="padding:20px;color:var(--muted);text-align:center;">Chart unavailable for ' + ticker + '</div>';
                }
            }
        }
        loadPredictionChart();
    })
    .catch(error => {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Get Prediction';
        detailsDiv.innerHTML = `
            <div style="color:#ff4444;padding:16px;background:var(--bg);border-radius:8px;border:1px solid #ff4444;">
                <strong>Error:</strong> ${error.message || 'Failed to connect to prediction service. Please try again.'}
            </div>
        `;
    });
});
</script>
{% endblock %}
